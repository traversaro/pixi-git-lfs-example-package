name: Check environments

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        environment: [pypi, pixi-build]

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Set up Pixi
        uses: prefix-dev/setup-pixi@v0.9.5
        with:
          environments: ${{ matrix.environment }}
          pixi-version: v0.67.2
          working-directory: .

      - name: Run STL check
        working-directory: .
        run: pixi run -e "${{ matrix.environment }}" check-stl-is-not-git-lfs-pointer
